<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BODOBirria POS v10</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #ffeb3b; --text: #fff; --green: #4caf50; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .tab-nav { display: flex; sticky; top: 0; background: #000; border-bottom: 2px solid var(--accent); z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .panel { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; }
        .btn-pay { background: var(--green); color: #000; font-weight: 900; border: none; cursor: pointer; height: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .card { background: #222; border: 1px solid #fff; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .item-cart { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        #auth-view { padding: 50px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-view">
        <h1 style="color: var(--accent);">BODO POS</h1>
        <input type="email" id="email" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-pay" onclick="iniciarSesion()">ENTRAR AL SISTEMA</button>
    </div>

    <div id="app-view" style="display:none;">
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="verTab('v-pos', this)">Venta</button>
            <button class="tab-btn" onclick="verTab('v-gastos', this)">Gastos</button>
            <button class="tab-btn" onclick="verTab('v-corte', this)">Corte</button>
            <button class="tab-btn" onclick="verTab('v-menu', this)">Menú</button>
        </nav>

        <div id="v-pos" class="content active">
            <div class="grid" id="grid-productos"></div>
            <div class="panel" style="margin-top:20px;">
                <h3>ORDEN</h3>
                <div id="lista-orden"></div>
                <h2 style="text-align:right">TOTAL: $<span id="t-monto">0</span></h2>
                <button class="btn-pay" onclick="cobrar()">PAGAR E IMPRIMIR</button>
            </div>
        </div>

        <div id="v-gastos" class="content">
            <div class="panel">
                <h3>NUEVO GASTO</h3>
                <input type="text" id="g-desc" placeholder="Concepto (ej. Gas, Desechables)">
                <input type="number" id="g-cantidad" placeholder="Monto $">
                <button class="btn-pay" style="background:#f44336; color:white" onclick="registrarGasto()">GUARDAR GASTO</button>
            </div>
            <div id="historial-gastos"></div>
        </div>

        <div id="v-corte" class="content">
            <div class="panel" style="text-align:center">
                <h3>BALANCE DE HOY</h3>
                <div style="display:flex; justify-content:space-around; font-size:1.2rem;">
                    <div>Ventas<br><strong id="c-ventas" style="color:var(--green)">$0</strong></div>
                    <div>Gastos<br><strong id="c-gastos" style="color:#f44336">$0</strong></div>
                </div>
                <button class="btn-pay" style="margin-top:20px; background:var(--accent); color:black" onclick="hacerCorte()">CERRAR CAJA AHORA</button>
            </div>
        </div>

        <div id="v-menu" class="content">
            <div class="panel">
                <h3>ADMINISTRAR PRECIOS</h3>
                <div id="admin-productos"></div>
            </div>
        </div>
    </div>

<script>
    const SURL = 'https://twqscsjdhklectswcjml.supabase.co';
    const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cXNjc2pkaGtsZWN0c3djam1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Njc4OTAsImV4cCI6MjA5MzA0Mzg5MH0.8zz26TNZ26FUdFNYv0ao7kon79LBRbnzF_1MBbzttZk';
    const sb = supabase.createClient(SURL, SKEY);

    let productos = [], carrito = [], vHoy = 0, gHoy = 0, uID = "";

    sb.auth.onAuthStateChange((ev, ses) => {
        if(ses) {
            uID = ses.user.id;
            document.getElementById('auth-view').style.display='none';
            document.getElementById('app-view').style.display='block';
            cargarTodo();
        }
    });

    async function iniciarSesion() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
        if(error) alert("Error: " + error.message);
    }

    async function cargarTodo() {
        const { data: p } = await sb.from('productos').select('*').order('nombre');
        productos = p || [];
        dibujarMenu();
        totalizarDia();
    }

    function dibujarMenu() {
        document.getElementById('grid-productos').innerHTML = productos.map(p => `
            <div class="card" onclick="agregar(${p.id})">${p.nombre}<br>$${p.precio}</div>
        `).join('');
        
        document.getElementById('admin-productos').innerHTML = productos.map(p => `
            <div class="panel">
                <strong>${p.nombre}</strong><br>
                Precio: $${p.precio} | Cat: ${p.categoria}
            </div>
        `).join('');
    }

    function agregar(id) {
        const p = productos.find(x => x.id === id);
        const ex = carrito.find(x => x.id === id);
        if(ex) ex.cant++; else carrito.push({...p, cant: 1});
        actualizarCarrito();
    }

    function actualizarCarrito() {
        let t = 0;
        document.getElementById('lista-orden').innerHTML = carrito.map(i => {
            t += (i.precio * i.cant);
            return `<div class="item-cart"><span>${i.cant}x ${i.nombre}</span><span>$${i.precio*i.cant}</span></div>`;
        }).join('');
        document.getElementById('t-monto').innerText = t;
    }

    async function registrarGasto() {
        const desc = document.getElementById('g-desc').value, cant = document.getElementById('g-cantidad').value;
        if(!desc || !cant) return alert("Pon concepto y cantidad");

        const { error } = await sb.from('gastos').insert([{ concepto: desc, monto: parseFloat(cant), user_id: uID }]);
        if(!error) {
            alert("Gasto guardado");
            document.getElementById('g-desc').value = "";
            document.getElementById('g-cantidad').value = "";
            totalizarDia();
        }
    }

    async function totalizarDia() {
        const hoy = new Date().toISOString().split('T')[0];
        const { data: v } = await sb.from('ventas').select('total').gte('fecha', hoy);
        const { data: g } = await sb.from('gastos').select('monto').gte('fecha', hoy);
        
        vHoy = v ? v.reduce((a, b) => a + parseFloat(b.total), 0) : 0;
        gHoy = g ? g.reduce((a, b) => a + parseFloat(b.monto), 0) : 0;
        
        document.getElementById('c-ventas').innerText = `$${vHoy}`;
        document.getElementById('c-gastos').innerText = `$${gHoy}`;
    }

    async function hacerCorte() {
        if(!confirm("¿Cerrar caja ahora?")) return;
        const { error } = await sb.from('cortes_caja').insert([{
            total_ventas: vHoy, total_gastos: gHoy, balance_final: (vHoy - gHoy), user_id: uID
        }]);
        if(!error) alert("CORTE GUARDADO EXITOSAMENTE");
    }

    async function cobrar() {
        if(carrito.length === 0) return;
        const total = document.getElementById('t-monto').innerText;
        const { error } = await sb.from('ventas').insert([{
            total: parseFloat(total), detalles: carrito.map(i => `${i.cant}x ${i.nombre}`).join(', '), user_id: uID
        }]);

        if(!error) {
            imprimirTodo();
            carrito = [];
            actualizarCarrito();
            totalizarDia();
        }
    }

    function imprimirTodo() {
        const win = window.open('', '_blank');
        let html = `<html><body style="font-family:monospace;width:58mm;padding:5px;font-size:12px;">
            <center><strong>BODO BIRRIA</strong><br>${new Date().toLocaleTimeString()}</center><hr>`;
        
        ['plancha', 'bebidas', 'freidora'].forEach(cat => {
            const items = carrito.filter(i => i.categoria === cat);
            if(items.length > 0) {
                html += `<div style="text-align:center;margin-top:10px;">-- ${cat.toUpperCase()} --</div>`;
                items.forEach(i => html += `<div>${i.cant}x ${i.nombre}</div>`);
                html += `<div style="border-bottom:1px dashed #000;margin:10px 0;"></div>`;
            }
        });

        html += `<center><br>TOTAL: $${document.getElementById('t-monto').innerText}<br>GRACIAS</center>
            <script>window.onload=function(){window.print();setTimeout(window.close, 500);}<\/script></body></html>`;
        
        win.document.write(html);
        win.document.close();
    }

    function verTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
