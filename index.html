 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BODOBirria - POS Cloud Agrupado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #151515; --text: #ffffff;
            --accent: #ffeb3b; --bebidas: #00e5ff; --plancha: #ff5722;
            --freidora: #ffeb3b; --danger: #ff4444; --success: #4caf50;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        #auth-view { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; border: 2px solid var(--accent); width: 320px; text-align: center; box-shadow: 0 0 20px rgba(255,235,59,0.2); }
        #app-view { display: none; }
        .tabs { display: flex; background: #111; border-bottom: 2px solid #fff; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,235,59,0.1); }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .panel { background: var(--panel); border: 2px solid #fff; border-radius: 15px; padding: 15px; box-shadow: 5px 5px 0px #000; margin-bottom: 15px; }
        input, select, button { padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .btn-main { background: var(--success); border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        .grid-pos { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .card { background: #222; border: 2px solid #fff; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; box-shadow: 3px 3px 0px #000; font-weight: bold; }
        .card.plancha { border-color: var(--plancha); }
        .card.bebidas { border-color: var(--bebidas); }
        .card.freidora { border-color: var(--freidora); }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; width: auto; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        @media (max-width: 900px) { .grid-pos { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="login-box">
            <h1 style="color: var(--accent); margin-bottom: 10px;">BODO POS</h1>
            <input type="email" id="email" placeholder="Usuario (Email)">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-main" onclick="handleAuth()">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="app-view">
        <div style="background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
            <span id="user-info" style="font-size: 0.8rem; color: var(--accent); font-weight: bold;"></span>
            <button onclick="signOut()" style="width:auto; background: var(--danger); padding: 5px 15px;">SALIR</button>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="openTab('pos')">🛒 VENTAS</button>
            <button class="tab-btn" onclick="openTab('inventario')">📦 MENÚ</button>
            <button class="tab-btn" onclick="openTab('finanzas')">📊 FINANZAS</button>
        </nav>

        <div id="pos" class="tab-content active">
            <div class="grid-pos">
                <div class="panel">
                    <h3 style="color: var(--accent);">PRODUCTOS</h3>
                    <div id="grid-venta" class="menu-grid"></div>
                </div>
                <div class="panel">
                    <h3>PEDIDO ACTUAL</h3>
                    <div id="carrito-lista" style="min-height: 250px; overflow-y: auto;"></div>
                    <hr>
                    <h2 style="text-align:right">TOTAL: $<span id="total-pos">0.00</span></h2>
                    <button class="btn-main" style="padding: 20px; font-size: 1.2rem;" onclick="finalizarVenta()">COBRAR E IMPRIMIR</button>
                </div>
            </div>
        </div>

        <div id="inventario" class="tab-content">
            <div class="panel">
                <h3>NUEVO PRODUCTO</h3>
                <input type="text" id="p-nombre" placeholder="Nombre">
                <input type="number" id="p-precio" placeholder="Precio $">
                <select id="p-cat">
                    <option value="plancha">Plancha</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="freidora">Freidora</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">GUARDAR EN NUBE</button>
            </div>
            <div class="panel">
                <h3>PRODUCTOS REGISTRADOS</h3>
                <table id="tabla-prod">
                    <thead><tr><th>Nombre</th><th>Precio</th><th>Categoría</th><th>Eliminar</th></tr></thead>
                    <tbody id="lista-prod-db"></tbody>
                </table>
            </div>
        </div>

        <div id="finanzas" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card"><h3>HOY</h3><h2 id="v-hoy">$0.00</h2></div>
                <div class="stat-card"><h3>MES</h3><h2 id="v-mes">$0.00</h2></div>
                <div class="stat-card"><h3>AÑO</h3><h2 id="v-ano">$0.00</h2></div>
            </div>
            <div class="panel" style="margin-top:20px;">
                <h3>HISTORIAL DE VENTAS (CORTE)</h3>
                <table id="tabla-finanzas">
                    <thead><tr><th>Fecha</th><th>Total</th><th>Detalles</th></tr></thead>
                    <tbody id="lista-ventas-db"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twqscsjdhklectswcjml.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cXNjc2pkaGtsZWN0c3djam1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Njc4OTAsImV4cCI6MjA5MzA0Mzg5MH0.8zz26TNZ26FUdFNYv0ao7kon79LBRbnzF_1MBbzttZk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSession = null;
        let productos = [];
        let carrito = [];

        _supabase.auth.onAuthStateChange((e, session) => {
            userSession = session;
            if (session) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
                document.getElementById('user-info').innerText = `BIENVENIDO: ${session.user.email}`;
                loadData();
            }
        });

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            await _supabase.auth.signInWithPassword({ email, password });
        }

        async function signOut() { await _supabase.auth.signOut(); }

        async function loadData() {
            const { data: p } = await _supabase.from('productos').select('*').order('nombre');
            productos = p || [];
            renderUI();
            loadFinanzas();
        }

        function renderUI() {
            const grid = document.getElementById('grid-venta');
            grid.innerHTML = productos.map(p => `
                <div class="card ${p.categoria}" onclick="addToCart(${p.id})">${p.nombre}<br>$${p.precio}</div>
            `).join('');

            const lista = document.getElementById('lista-prod-db');
            lista.innerHTML = productos.map(p => `
                <tr><td>${p.nombre}</td><td>$${p.precio}</td><td>${p.categoria}</td>
                <td><button class="btn-del" onclick="deleteProd(${p.id})">✕</button></td></tr>
            `).join('');
        }

        function addToCart(id) {
            const prod = productos.find(x => x.id === id);
            const itemExistente = carrito.find(x => x.id === id);
            if (itemExistente) {
                itemExistente.cant++;
            } else {
                carrito.push({...prod, cant: 1});
            }
            updateCartUI();
        }

        function updateCartUI() {
            const lista = document.getElementById('carrito-lista');
            let total = 0;
            lista.innerHTML = carrito.map(item => {
                total += (item.precio * item.cant);
                return `
                    <div class="item-carrito">
                        <span><b>${item.cant}x</b> ${item.nombre}</span>
                        <span>$${(item.precio * item.cant).toFixed(2)}</span>
                        <button class="btn-del" onclick="removeFromCart(${item.id})">✕</button>
                    </div>`;
            }).join('');
            document.getElementById('total-pos').innerText = total.toFixed(2);
        }

        function removeFromCart(id) {
            carrito = carrito.filter(x => x.id !== id);
            updateCartUI();
        }

        async function saveProduct() {
            const n = document.getElementById('p-nombre').value;
            const p = document.getElementById('p-precio').value;
            const c = document.getElementById('p-cat').value;
            await _supabase.from('productos').insert([{ nombre: n, precio: p, categoria: c, user_id: userSession.user.id }]);
            loadData();
        }

        async function deleteProd(id) {
            if(confirm("¿Eliminar producto?")) {
                await _supabase.from('productos').delete().eq('id', id);
                loadData();
            }
        }

        async function finalizarVenta() {
            if (carrito.length === 0) return;
            const total = document.getElementById('total-pos').innerText;
            const detalles = carrito.map(i => `${i.cant}x ${i.nombre}`).join(', ');
            
            const { error } = await _supabase.from('ventas').insert([{ total, detalles, user_id: userSession.user.id }]);
            
            if (!error) {
                imprimirTicket();
                carrito = [];
                updateCartUI();
                loadFinanzas();
            }
        }

        function imprimirTicket() {
            const fecha = new Date().toLocaleString();
            const total = document.getElementById('total-pos').innerText;
            
            // Agrupamos por categoría para el ticket
            const agrupar = (cat) => carrito.filter(i => i.categoria === cat);
            const plancha = agrupar('plancha');
            const bebidas = agrupar('bebidas');
            const freidora = agrupar('freidora');

            const genSeccion = (titulo, items) => {
                if (items.length === 0) return "";
                return `<div style="text-align:center; font-weight:bold; margin-top:10px;">--- ${titulo} ---</div>` +
                    items.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.cant}x ${i.nombre.substring(0,15)}</span><span>$${(i.precio * i.cant).toFixed(2)}</span></div>`).join('');
            };

            const win = window.open('', '', 'width=300,height=600');
            win.document.write(`
                <html><head><style>
                    body { font-family: monospace; width: 58mm; padding: 2mm; font-size: 12px; }
                    .center { text-align: center; }
                </style></head><body>
                    <div class="center"><strong>BODO BIRRIA</strong><br>Ticket de Venta<br>${fecha}</div>
                    <div style="border-top:1px dashed #000; margin:5px 0;"></div>
                    ${genSeccion('PLANCHA', plancha)}
                    ${genSeccion('BEBIDAS', bebidas)}
                    ${genSeccion('FREIDORA', freidora)}
                    <div style="border-top:1px dashed #000; margin:10px 0;"></div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
                        <span>TOTAL:</span><span>$${total}</span>
                    </div>
                    <div class="center" style="margin-top:20px;">¡Gracias por su preferencia!<br>BODO POS Cloud</div>
                    <script>window.onload = function(){ window.print(); window.close(); };<\/script>
                </body></html>
            `);
            win.document.close();
        }

        async function loadFinanzas() {
            const { data } = await _supabase.from('ventas').select('*').order('fecha', { ascending: false });
            if (!data) return;
            let hoy = 0, mes = 0, ano = 0;
            const now = new Date();
            data.forEach(v => {
                const f = new Date(v.fecha);
                if (f.toDateString() === now.toDateString()) hoy += parseFloat(v.total);
                if (f.getMonth() === now.getMonth() && f.getFullYear() === now.getFullYear()) mes += parseFloat(v.total);
                if (f.getFullYear() === now.getFullYear()) ano += parseFloat(v.total);
            });
            document.getElementById('v-hoy').innerText = `$${hoy.toFixed(2)}`;
            document.getElementById('v-mes').innerText = `$${mes.toFixed(2)}`;
            document.getElementById('v-ano').innerText = `$${ano.toFixed(2)}`;
            document.getElementById('lista-ventas-db').innerHTML = data.map(v => `
                <tr><td>${new Date(v.fecha).toLocaleString()}</td><td>$${v.total}</td><td>${v.detalles}</td></tr>
            `).join('');
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
