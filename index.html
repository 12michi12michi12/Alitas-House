<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BODO POS - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #151515; --accent: #ffeb3b; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .panel { background: var(--panel); border: 2px solid #fff; border-radius: 12px; padding: 15px; margin: 10px; }
        .tabs { display: flex; sticky; top: 0; background: #000; z-index: 10; border-bottom: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 15px; color: #888; background: none; border: none; font-weight: bold; font-size: 14px; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; }
        .btn-main { background: #4caf50; border: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .card { background: #333; border: 1px solid #fff; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-view" style="padding: 40px 20px; text-align: center;">
        <h2 style="color: var(--accent);">BODO POS LOGIN</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-main" onclick="handleAuth()">INGRESAR</button>
    </div>

    <div id="app-view" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn active" onclick="openTab('pos')">VENTAS</button>
            <button class="tab-btn" onclick="openTab('gastos')">GASTOS</button>
            <button class="tab-btn" onclick="openTab('finanzas')">CORTE</button>
            <button class="tab-btn" onclick="openTab('menu')">MENÚ</button>
        </nav>

        <!-- VENTAS -->
        <div id="pos" class="tab-content active">
            <div class="grid" id="grid-venta"></div>
            <div class="panel">
                <h3>PEDIDO ACTUAL</h3>
                <div id="carrito-lista"></div>
                <h2>TOTAL: $<span id="total-pos">0.00</span></h2>
                <button class="btn-main" onclick="finalizarVenta()" style="height: 60px;">COBRAR E IMPRIMIR</button>
            </div>
        </div>

        <!-- GASTOS -->
        <div id="gastos" class="tab-content">
            <div class="panel">
                <h3>REGISTRAR GASTO</h3>
                <input type="text" id="g-concepto" placeholder="¿En qué se gastó?">
                <input type="number" id="g-monto" placeholder="Monto $">
                <button class="btn-main" style="background: #ff5722;" onclick="saveGasto()">GUARDAR GASTO</button>
            </div>
            <div id="lista-gastos-hoy"></div>
        </div>

        <!-- FINANZAS / CORTE -->
        <div id="finanzas" class="tab-content">
            <div class="panel" style="text-align:center;">
                <div style="display:flex; justify-content: space-around;">
                    <div>Ventas: <br><strong id="res-ventas">$0</strong></div>
                    <div>Gastos: <br><strong id="res-gastos">$0</strong></div>
                </div>
                <hr>
                <button class="btn-main" style="background: var(--accent); color: #000;" onclick="realizarCorte()">REALIZAR CORTE DE CAJA</button>
            </div>
            <div id="historial-cortes"></div>
        </div>

        <!-- MENU (GESTIÓN) -->
        <div id="menu" class="tab-content">
            <div class="panel">
                <h3>NUEVO PRODUCTO</h3>
                <input type="text" id="p-nombre" placeholder="Nombre">
                <input type="number" id="p-precio" placeholder="Precio">
                <select id="p-cat">
                    <option value="plancha">Plancha</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="freidora">Freidora</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">AÑADIR AL MENÚ</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twqscsjdhklectswcjml.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cXNjc2pkaGtsZWN0c3djam1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Njc4OTAsImV4cCI6MjA5MzA0Mzg5MH0.8zz26TNZ26FUdFNYv0ao7kon79LBRbnzF_1MBbzttZk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSession = null;
        let productos = [];
        let carrito = [];
        let ventasHoyTotal = 0;
        let gastosHoyTotal = 0;

        _supabase.auth.onAuthStateChange((e, session) => {
            if (session) {
                userSession = session;
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
                loadAll();
            }
        });

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if(error) alert("Error: " + error.message);
        }

        async function loadAll() {
            const { data: p } = await _supabase.from('productos').select('*').order('nombre');
            productos = p || [];
            renderMenu();
            loadFinanzas();
        }

        function renderMenu() {
            document.getElementById('grid-venta').innerHTML = productos.map(p => `
                <div class="card" onclick="addToCart(${p.id})">${p.nombre}<br>$${p.precio}</div>
            `).join('');
        }

        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            const ex = carrito.find(x => x.id === id);
            if (ex) ex.cant++; else carrito.push({...p, cant: 1});
            updateCartUI();
        }

        function updateCartUI() {
            let t = 0;
            document.getElementById('carrito-lista').innerHTML = carrito.map(i => {
                t += (i.precio * i.cant);
                return `<div class="item-row"><span>${i.cant}x ${i.nombre}</span><span>$${(i.precio*i.cant)}</span></div>`;
            }).join('');
            document.getElementById('total-pos').innerText = t.toFixed(2);
        }

        async function saveGasto() {
            const concepto = document.getElementById('g-concepto').value;
            const monto = document.getElementById('g-monto').value;
            if(!concepto || !monto) return alert("Llena todos los campos");

            const { error } = await _supabase.from('gastos').insert([{ 
                concepto, 
                monto: parseFloat(monto), 
                user_id: userSession.user.id 
            }]);

            if(!error) {
                alert("Gasto guardado correctamente");
                document.getElementById('g-concepto').value = "";
                document.getElementById('g-monto').value = "";
                loadFinanzas();
            } else {
                alert("Error al guardar: " + error.message);
            }
        }

        async function loadFinanzas() {
            const hoy = new Date().toISOString().split('T')[0];
            const { data: v } = await _supabase.from('ventas').select('total').gte('fecha', hoy);
            const { data: g } = await _supabase.from('gastos').select('monto').gte('fecha', hoy);

            ventasHoyTotal = v ? v.reduce((a, b) => a + parseFloat(b.total), 0) : 0;
            gastosHoyTotal = g ? g.reduce((a, b) => a + parseFloat(b.monto), 0) : 0;

            document.getElementById('res-ventas').innerText = `$${ventasHoyTotal.toFixed(2)}`;
            document.getElementById('res-gastos').innerText = `$${gastosHoyTotal.toFixed(2)}`;
        }

        async function realizarCorte() {
            if(!confirm("¿Deseas cerrar la caja con los valores actuales?")) return;
            
            const balance = ventasHoyTotal - gastosHoyTotal;
            const { error } = await _supabase.from('cortes_caja').insert([{
                total_ventas: ventasHoyTotal,
                total_gastos: gastosHoyTotal,
                balance_final: balance,
                user_id: userSession.user.id
            }]);

            if(!error) {
                alert("CORTE REALIZADO CON ÉXITO");
                loadFinanzas();
            }
        }

        async function finalizarVenta() {
            if(carrito.length === 0) return;
            const total = document.getElementById('total-pos').innerText;
            const detalles = carrito.map(i => `${i.cant}x ${i.nombre}`).join(', ');

            const { error } = await _supabase.from('ventas').insert([{ 
                total: parseFloat(total), 
                detalles, 
                user_id: userSession.user.id 
            }]);

            if(!error) {
                imprimirTicketsLocales();
                carrito = [];
                updateCartUI();
                loadFinanzas();
            }
        }

        function imprimirTicketsLocales() {
            const cats = ['plancha', 'bebidas', 'freidora'];
            cats.forEach(c => {
                const items = carrito.filter(i => i.categoria === c);
                if(items.length > 0) {
                    const t = window.open('', '_blank');
                    t.document.write(`<html><body style="font-family:monospace;width:58mm;">
                        <center><strong>BODO - ${c.toUpperCase()}</strong><br>${new Date().toLocaleTimeString()}</center><hr>
                        ${items.map(i => `<div>${i.cant}x ${i.nombre}</div>`).join('')}
                        <script>window.onload=function(){window.print();window.close();}<\/script></body></html>`);
                    t.document.close();
                }
            });
        }

        async function saveProduct() {
            const nombre = document.getElementById('p-nombre').value;
            const precio = document.getElementById('p-precio').value;
            const categoria = document.getElementById('p-cat').value;
            await _supabase.from('productos').insert([{ nombre, precio, categoria, user_id: userSession.user.id }]);
            loadAll();
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
